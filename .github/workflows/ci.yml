name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.87"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy (SDK)
        run: cargo clippy -p aomi-sdk -p xtask -- -Dwarnings

      - name: Clippy (apps, warnings only)
        run: cargo clippy --workspace --lib
        continue-on-error: true

      - name: Test SDK
        run: cargo test -p aomi-sdk

      - name: Build all plugins
        run: cargo xtask build-aomi

  publish-sdk:
    name: Publish SDK
    needs: check
    runs-on: ubuntu-latest
    environment: prod
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.87"

      - uses: Swatinem/rust-cache@v2

      - name: Publish aomi-sdk
        run: cargo publish -p aomi-sdk
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
