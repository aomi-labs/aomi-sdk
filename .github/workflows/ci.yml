name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, publish]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    outputs:
      publish_sdk: ${{ steps.sdk-version.outputs.publish_sdk }}
      sdk_version: ${{ steps.sdk-version.outputs.sdk_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check SDK version bump
        id: sdk-version
        env:
          SDK_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          python3 scripts/check_sdk_version_bump.py \
            --base "$SDK_BASE_SHA" \
            --head "${{ github.sha }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy (workspace)
        run: cargo clippy --workspace --lib -- -Dwarnings

      - name: Test SDK
        run: cargo test -p aomi-sdk

      - name: Detect changed apps
        id: changed-apps
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          changed=$(git diff --name-only "$BASE_SHA" HEAD -- 'apps/*/src/**' 'apps/*/Cargo.toml' \
            | sed -n 's|^apps/\([^/]*\)/.*|\1|p' | sort -u | tr '\n' ' ')
          echo "apps=$changed" >> "$GITHUB_OUTPUT"
          echo "Changed apps: $changed"

      - name: Check apps (fmt + clippy + compile tests)
        if: steps.changed-apps.outputs.apps != ''
        run: |
          failed=0
          for app_name in ${{ steps.changed-apps.outputs.apps }}; do
            manifest="apps/$app_name/Cargo.toml"
            [ -f "$manifest" ] || continue
            echo "::group::$app_name"
            cargo fmt --manifest-path "$manifest" -- --check || failed=1
            cargo clippy --manifest-path "$manifest" --lib -- -Dwarnings || failed=1
            cargo test --manifest-path "$manifest" --no-run 2>/dev/null || true
            echo "::endgroup::"
          done
          exit $failed

      - name: Build all plugins
        run: cargo xtask build-aomi

  publish-sdk:
    name: Publish SDK
    needs: check
    runs-on: ubuntu-latest
    environment: prod
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.check.outputs.publish_sdk == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - uses: Swatinem/rust-cache@v2

      - name: Publish summary
        run: echo "Publishing aomi-sdk v${{ needs.check.outputs.sdk_version }}"

      - name: Publish aomi-sdk
        run: cargo publish -p aomi-sdk
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
