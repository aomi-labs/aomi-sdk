name: Release Plugins

on:
  push:
    branches:
      - publish
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-plugins
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve app release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve app release tag
        id: resolve
        run: |
          EXISTING_TAG=$(git tag --points-at "${GITHUB_SHA}" -l 'apps-v*' --sort=-v:refname | head -1)
          if [ -n "$EXISTING_TAG" ]; then
            TAG="$EXISTING_TAG"
            VERSION="${TAG#apps-v}"
          else
            LATEST_TAG=$(git tag -l 'apps-v*' --sort=-v:refname | head -1)
            if [ -z "$LATEST_TAG" ]; then
              VERSION="0.1.0"
            else
              BASE_VERSION="${LATEST_TAG#apps-v}"
              IFS=. read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
              VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
            TAG="apps-v${VERSION}"

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG" -m "Auto-tagged from publish branch"
            git push origin "$TAG"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$VERSION tag=$TAG"

  build:
    name: Build plugins (${{ matrix.target }})
    needs: resolve
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build all plugins
        run: cargo xtask build-aomi --release --target ${{ matrix.target }}

      - name: Generate manifest.json
        run: |
          python3 <<'PY'
          import hashlib
          import json
          import pathlib
          import tomllib

          repo = pathlib.Path.cwd()
          plugins_dir = repo / "plugins"
          sdk_toml = tomllib.loads((repo / "sdk" / "Cargo.toml").read_text())
          sdk_version = sdk_toml["package"]["version"]

          plugins = {}
          for path in sorted(plugins_dir.iterdir()):
              if not path.is_file() or path.name == "manifest.json":
                  continue
              plugins[path.stem] = {
                  "file": path.name,
                  "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
              }

          manifest = {
              "version": "${{ needs.resolve.outputs.version }}",
              "app_release_tag": "${{ needs.resolve.outputs.tag }}",
              "sdk_version": sdk_version,
              "target": "${{ matrix.target }}",
              "commit": "${{ github.sha }}",
              "plugins": plugins,
          }

          manifest_path = plugins_dir / "manifest.json"
          manifest_path.write_text(json.dumps(manifest, indent=2) + "\n")
          print(manifest_path.read_text())
          PY

      - name: Create tarball
        run: |
          tar czf aomi-plugins-v${{ needs.resolve.outputs.version }}-${{ matrix.target }}.tar.gz plugins/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugins-${{ matrix.target }}
          path: aomi-plugins-v${{ needs.resolve.outputs.version }}-${{ matrix.target }}.tar.gz

  release:
    name: Create GitHub Release
    needs: [resolve, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > release-notes.md <<EOF
          Pre-built plugin binaries for the Aomi runtime.

          ## Assets
          - \`aomi-plugins-v${{ needs.resolve.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz\` - Linux x86_64
          - \`aomi-plugins-v${{ needs.resolve.outputs.version }}-aarch64-apple-darwin.tar.gz\` - macOS ARM64

          ## Consumption
          product-mono downloads these release assets using \`AOMI_PLUGINS_REPO\` and \`APP_RELEASE_TAG\`.
          EOF

          if gh release view "${{ needs.resolve.outputs.tag }}" >/dev/null 2>&1; then
            gh release upload "${{ needs.resolve.outputs.tag }}" dist/*.tar.gz --clobber
          else
            gh release create "${{ needs.resolve.outputs.tag }}" \
              --title "Plugins ${{ needs.resolve.outputs.version }}" \
              --notes-file release-notes.md \
              dist/*.tar.gz
          fi
